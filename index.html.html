<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chị Hải Quiz - Ôn Tập Giữa Kỳ II</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #7eb09b;
            --secondary-green: #f1f7f5;
            --accent-orange: #f2a65a;
            --error-red: #e57373;
            --text-dark: #2c3e50;
            --bg-pastel: #fdfcf0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-pastel);
            color: var(--text-dark);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        #app {
            background: white; width: 100%; max-width: 750px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px; position: relative;
        }

        .timer-container { width: 100%; height: 8px; background: var(--secondary-green); border-radius: 4px; margin-bottom: 20px; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary-green); border-radius: 4px; transition: width 1s linear; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .chi-hai-avatar { font-size: 1.1rem; font-weight: 700; color: var(--primary-green); }

        .question-text {
            font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; line-height: 1.6;
            background: #f9f9f9; padding: 20px; border-radius: 10px; border-left: 4px solid var(--primary-green);
        }

        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .option-btn {
            background: white; border: 2px solid var(--secondary-green); padding: 15px;
            border-radius: 12px; font-size: 1rem; cursor: pointer; transition: all 0.2s;
            font-family: inherit; text-align: left;
        }

        .option-btn:hover { border-color: var(--primary-green); background: var(--secondary-green); }
        .option-btn.correct { background: var(--primary-green) !important; color: white; border-color: var(--primary-green); }
        .option-btn.wrong { background: var(--error-red) !important; color: white; border-color: var(--error-red); }

        #explanation { margin-top: 20px; padding: 15px; background: #fff8e1; border-left: 5px solid var(--accent-orange); border-radius: 8px; display: none; }
        .next-btn { margin-top: 15px; background: var(--text-dark); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; float: right; font-family: inherit; font-weight: 600; }

        #stats { display: none; text-align: center; }
        .review-list { text-align: left; margin-top: 20px; max-height: 350px; overflow-y: auto; border-top: 2px solid var(--secondary-green); padding-top: 15px; }
        .review-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="app">
    <div id="game-container">
        <div class="header">
            <div class="chi-hai-avatar">👩‍🏫 Chị Hải: <span id="feedback-msg">Cố lên em nhé!</span></div>
            <div id="progress-text">1/46</div>
        </div>
        <div class="timer-container"><div id="timer-bar"></div></div>
        <div class="question-text" id="question">Đang tải...</div>
        <div class="options-grid" id="options"></div>
        <div id="explanation">
            <div id="exp-content"></div>
            <button class="next-btn" onclick="nextQuestion()">Tiếp theo ➔</button>
        </div>
    </div>

    <div id="stats">
        <h2>🎉 Kết quả bài ôn tập</h2>
        <div id="summary-data" style="font-size: 1.2rem; margin: 20px 0;"></div>
        <div class="review-list" id="review-list"><h3>Cần xem lại:</h3></div>
        <button class="next-btn" style="float:none; margin-top:20px;" onclick="location.reload()">Làm lại bài</button>
    </div>
</div>

<script>
    const questionsData = [
        // VOCABULARY I (35 CÂU - ĐÃ XÓA 1 CÂU TRÙNG LẶP)
        { q: "1. Mark is crazy about _______ the wonders of nature.", opts: ["exploring", "covering", "finding", "developing"], ans: 0, trans: "Mark rất cuồng khám phá các kỳ quan thiên nhiên.", note: "Cấu trúc: Be crazy about + V-ing." },
        { q: "2. The Amazon Rainforest is known for its _______ biodiversity.", opts: ["limited", "ancient", "rich", "sparse"], ans: 2, trans: "Rừng mưa Amazon nổi tiếng với sự đa dạng sinh học phong phú.", note: "Rich biodiversity: Đa dạng sinh học phong phú." },
        { q: "3. Mount Everest is the highest _______ in the world.", opts: ["plateau", "river", "peak", "island"], ans: 2, trans: "Núi Everest là đỉnh núi cao nhất thế giới.", note: "Peak: Đỉnh núi." },
        { q: "4. The Great Barrier Reef is an incredible _______ system.", opts: ["cave", "desert", "reef", "mountain"], ans: 2, trans: "Đảo san hô Great Barrier là một hệ thống rạn san hô đáng kinh ngạc.", note: "Reef: Rạn san hô." },
        { q: "5. The Sahara Desert is the largest _______ in the world.", opts: ["forest", "glacier", "desert", "lake"], ans: 2, trans: "Sa mạc Sahara là sa mạc lớn nhất thế giới.", note: "Desert: Sa mạc." },
        { q: "6. Victoria Falls is a spectacular _______.", opts: ["volcano", "waterfall", "plateau", "cave"], ans: 1, trans: "Thác Victoria là một thác nước ngoạn mục.", note: "Waterfall: Thác nước." },
        { q: "7. The Dead Sea is notable for its _______ salinity.", opts: ["low", "average", "high", "normal"], ans: 2, trans: "Biển Chết nổi tiếng vì độ mặn cao.", note: "Salinity: Độ mặn." },
        { q: "8. The Great Wall of China is one of the world’s most famous _______.", opts: ["deserts", "forests", "landmarks", "lakes"], ans: 2, trans: "Vạn Lý Trường Thành là một trong những địa danh nổi tiếng nhất thế giới.", note: "Landmarks: Các địa danh/công trình nổi tiếng." },
        { q: "9. It was risky for him to climb to the peak, but we couldn’t help _______ his courage.", opts: ["admiring", "exploring", "keen on", "protecting"], ans: 0, trans: "Việc leo lên đỉnh núi thật mạo hiểm, nhưng chúng tôi không thể ngừng ngưỡng mộ lòng dũng cảm của anh ấy.", note: "Can't help + V-ing: Không thể nhịn được việc gì." },
        { q: "10. Yellowstone National Park is famous _______ its hot springs and geysers.", opts: ["on", "for", "in", "with"], ans: 1, trans: "Công viên quốc gia Yellowstone nổi tiếng về các suối nước nóng và mạch nước phun.", note: "Famous for: Nổi tiếng vì cái gì." },
        { q: "11. If you want to explore a city at your own pace without a guide, you might choose a ______. ", opts: ["homestay", "package holiday", "self-guided tour", "ruinous site"], ans: 2, trans: "Nếu bạn muốn khám phá thành phố theo tốc độ riêng mà không cần hướng dẫn viên, bạn có thể chọn tour tự túc.", note: "Self-guided tour: Chuyến đi tự hướng dẫn." },
        { q: "12. A ______ is a document that outlines the activities and places you will visit during your journey.", opts: ["entrance ticket", "trip itinerary", "travel agency", "smooth trip"], ans: 1, trans: "Lịch trình chuyến đi là tài liệu phác thảo các hoạt động và địa điểm bạn sẽ tới.", note: "Trip itinerary: Lịch trình chuyến đi." },
        { q: "13. When you stay in a local person’s home instead of a hotel, it is called a ______. ", opts: ["package holiday", "homestay", "ruinous site", "self-guided tour"], ans: 1, trans: "Khi bạn ở tại nhà người dân thay vì khách sạn, đó gọi là homestay.", note: "Homestay: Nghỉ chân tại nhà dân." },
        { q: "14. If you buy a travel deal that includes flights, accommodation, and activities altogether, you have booked a ______. ", opts: ["smooth trip", "package holiday", "travel agency", "trip itinerary"], ans: 1, trans: "Nếu bạn mua gói du lịch bao gồm cả chuyến bay, chỗ ở và hoạt động, bạn đã đặt kỳ nghỉ trọn gói.", note: "Package holiday: Kỳ nghỉ trọn gói." },
        { q: "15. To ensure that everything goes well during your journey, you might hope for a ______. ", opts: ["homestay", "entrance ticket", "travel agency", "smooth trip"], ans: 3, trans: "Để đảm bảo mọi thứ diễn ra tốt đẹp, bạn sẽ mong có một chuyến đi suôn sẻ.", note: "Smooth trip: Chuyến đi suôn sẻ/thuận lợi." },
        { q: "16. A ______ is a company that helps you plan and book your travel arrangements.", opts: ["self-guided tour", "ruinous site", "travel agency", "entrance ticket"], ans: 2, trans: "Đại lý du lịch là công ty giúp bạn lập kế hoạch và đặt các dịch vụ du lịch.", note: "Travel agency: Đại lý du lịch." },
        { q: "17. Before visiting an attraction, you often need to buy an ______. ", opts: ["trip itinerary", "entrance ticket", "homestay", "smooth trip"], ans: 1, trans: "Trước khi tham quan một điểm du lịch, bạn thường cần mua vé vào cửa.", note: "Entrance ticket: Vé vào cửa." },
        { q: "18. A site that has been damaged and is now in poor condition could be described as a ______. ", opts: ["ruinous site", "package holiday", "travel agency", "self-guided tour"], ans: 0, trans: "Một địa điểm bị hư hại và ở trong tình trạng kém có thể gọi là di tích đổ nát.", note: "Ruinous site: Địa điểm đổ nát." },
        { q: "19. If you want a complete travel package including all necessary arrangements, you should contact a ______. ", opts: ["ruinous site", "self-guided tour", "travel agency", "entrance ticket"], ans: 2, trans: "Nếu muốn một gói du lịch đầy đủ sắp xếp mọi thứ, bạn nên liên hệ đại lý du lịch.", note: "Travel agency: Đại lý du lịch." },
        { q: "20. The Colosseum in Rome is not in its ______condition. You can only see parts of it. ", opts: ["original", "origin", "ruinous", "smooth"], ans: 0, trans: "Đấu trường Colosseum ở Rome không còn ở trạng thái nguyên bản. Bạn chỉ có thể thấy một phần của nó.", note: "Original condition: Tình trạng ban đầu/nguyên bản." },
        { q: "21. When I don’t know what an English word means, I often look it _____ in my English-Vietnamese dictionary. ", opts: ["after", "for", "at", "up"], ans: 3, trans: "Khi tôi không biết nghĩa của một từ tiếng Anh, tôi thường tra cứu nó trong từ điển.", note: "Look up: Tra cứu (từ điển, thông tin)." },
        { q: "22. _______ education is very important for personal and professional development. ", opts: ["Excellent", "Standard", "Clarity", "Effective"], ans: 3, trans: "Giáo dục hiệu quả rất quan trọng cho sự phát triển cá nhân và sự nghiệp chuyên nghiệp.", note: "Effective education: Giáo dục hiệu quả." },
        { q: "23. We need to ________ a solution to the problem quickly. ", opts: ["praise", "decide", "increase", "improve"], ans: 1, trans: "Chúng ta cần quyết định một giải pháp cho vấn đề này thật nhanh.", note: "Decide a solution: Quyết định một giải pháp." },
        { q: "24. It is important to ________ new vocabulary words to use them correctly. ", opts: ["look up", "provide", "establish", "recommend"], ans: 0, trans: "Việc tra cứu từ mới là quan trọng để sử dụng chúng chính xác.", note: "Look up: Tra cứu từ vựng." },
        { q: "25. The _______ in a new city often provides a comfortable place to rest after a day of sightseeing. ", opts: ["accommodation", "cruise", "ticket", "safari"], ans: 0, trans: "Chỗ ở tại thành phố mới thường cung cấp nơi nghỉ ngơi thoải mái sau ngày tham quan.", note: "Accommodation: Chỗ ăn ở/nghỉ ngơi." },
        { q: "26. _______tourism involves activities like safaris and exploring natural environments. ", opts: ["Historical", "Shopping", "Ecotourism", "Food"], ans: 2, trans: "Du lịch sinh thái bao gồm các hoạt động như chuyến đi quan sát động vật hoang dã và khám phá thiên nhiên.", note: "Ecotourism: Du lịch sinh thái." },
        { q: "27. _______ involves visiting places and participating in local cultural activities. ", opts: ["Sports tourism", "Shopping tourism", "Cultural tourism", "Ecotourism"], ans: 2, trans: "Du lịch văn hóa bao gồm việc tham quan các địa điểm và tham gia các hoạt động văn hóa địa phương.", note: "Cultural tourism: Du lịch văn hóa." },
        { q: "28. The ________ of the mountain was covered in snow. ", opts: ["charm", "coast", "peak", "access"], ans: 2, trans: "Đỉnh núi đã bị bao phủ bởi tuyết.", note: "Peak: Đỉnh núi." },
        { q: "29. They need _______ to enter the restricted area. ", opts: ["contribution", "permission", "occurrence", "disaster"], ans: 1, trans: "Họ cần sự cho phép để đi vào khu vực hạn chế.", note: "Permission: Sự cho phép." },
        { q: "30. The ________ of the site helped preserve its historical value. ", opts: ["support", "charm", "conservation", "discovery"], ans: 2, trans: "Việc bảo tồn địa điểm này đã giúp giữ gìn giá trị lịch sử của nó.", note: "Conservation: Sự bảo tồn." },
        { q: "31. The major _____ of the Galapagos Islands is its unique and fearless animals... ", opts: ["attract", "attractive", "attraction", "attractively"], ans: 2, trans: "Sự thu hút chính của đảo Galapagos là các loài động vật độc đáo và không sợ người.", note: "Attraction (n): Điểm thu hút/Sự thu hút." },
        { q: "32. Every one of us has made a positive _____ to the overall success of the project. ", opts: ["contribute", "contribution", "contributor", "contributing"], ans: 1, trans: "Mỗi người chúng ta đều có đóng góp tích cực cho thành công chung của dự án.", note: "Make a contribution to: Đóng góp vào." },
        { q: "33. My uncle is an active _____ of the local fauna and flora preservation scheme. ", opts: ["supporter", "support", "supportive", "supported"], ans: 0, trans: "Chú tôi là một người ủng hộ tích cực của chương trình bảo tồn động thực vật địa phương.", note: "Supporter: Người ủng hộ." },
        { q: "34. There has been a _____ increase in the number of foreign tourists to Ha Long Bay... ", opts: ["signify", "significantly", "significance", "significant"], ans: 3, trans: "Đã có sự gia tăng đáng kể lượng khách du lịch nước ngoài đến Vịnh Hạ Long.", note: "Significant increase: Sự gia tăng đáng kể." },
        { q: "35. The island has a very beautiful beach, but sadly it is not easily _____. ", opts: ["access", "accessible", "inaccessible", "inaccessibly"], ans: 1, trans: "Hòn đảo có bãi biển rất đẹp, nhưng đáng buồn là nó không dễ dàng tiếp cận.", note: "Accessible: Có thể tiếp cận được." },

        // CLOSEST IN MEANING II (12 CÂU - GIỮ NGUYÊN)
        { q: "36. CLOSEST: The Niagara Falls attract millions of tourists *annually* with its breathtaking beauty. ", opts: ["daily", "monthly", "yearly", "weekly"], ans: 2, trans: "Thác Niagara thu hút hàng triệu du khách mỗi năm với vẻ đẹp ngoạn mục.", note: "Annually = Yearly: Hàng năm." },
        { q: "37. CLOSEST: The tour operator agreed to *work out* a new itinerary following our requirements. ", opts: ["locate", "plan", "support", "hunt"], ans: 1, trans: "Đơn vị lữ hành đã đồng ý lên kế hoạch một lịch trình mới theo yêu cầu của chúng tôi.", note: "Work out = Plan: Lên kế hoạch/Xây dựng." },
        { q: "38. CLOSEST: Cultural tours offer exclusive *access* to historical landmarks and sites. ", opts: ["exit", "opening", "closure", "entry"], ans: 3, trans: "Các tour văn hóa cung cấp quyền tiếp cận riêng biệt tới các địa danh và di tích lịch sử.", note: "Access = Entry: Sự tiếp cận/Lối vào." },
        { q: "39. CLOSEST: The villagers are unhappy with the campers. Their tents seem to destroy the *landscape*. ", opts: ["scenery", "coral", "access", "feature"], ans: 0, trans: "Người dân làng không hài lòng với những người cắm trại. Lều của họ dường như phá hỏng cảnh quan.", note: "Landscape = Scenery: Phong cảnh." },
        { q: "40. CLOSEST: John likes to *explore* local places and food when he goes on holiday. ", opts: ["permit", "locate", "discover", "support"], ans: 2, trans: "John thích khám phá các địa điểm và đồ ăn địa phương khi đi nghỉ mát.", note: "Explore = Discover: Khám phá." },
        { q: "41. CLOSEST: The wonderful *diversity* of wildlife in this forest is now under threat. ", opts: ["paradise", "location", "destination", "variety"], ans: 3, trans: "Sự đa dạng tuyệt vời của động vật hoang dã trong khu rừng này hiện đang bị đe dọa.", note: "Diversity = Variety: Sự đa dạng." },
        { q: "42. CLOSEST: The tour operator provided a detailed *itinerary* for the trip. ", opts: ["schedule", "list", "program", "tip"], ans: 0, trans: "Đơn vị lữ hành cung cấp lịch trình chi tiết cho chuyến đi.", note: "Itinerary = Schedule: Lịch trình." },
        { q: "43. CLOSEST: The *breathtaking* views from the mountaintop were the highlight of our trip. ", opts: ["disgusting", "stunning", "charming", "relaxing"], ans: 1, trans: "Tầm nhìn ngoạn mục từ đỉnh núi là điểm nhấn của chuyến đi chúng tôi.", note: "Breathtaking = Stunning: Đẹp đến kinh ngạc." },
        { q: "44. CLOSEST: Learners of English often *look up* new words in dictionaries. ", opts: ["set up", "go over", "search for", "come from"], ans: 2, trans: "Người học tiếng Anh thường tra cứu từ mới trong từ điển.", note: "Look up = Search for: Tra cứu." },
        { q: "45. CLOSEST: Because English has become a global language, many *foreign* words have been incorporated. ", opts: ["excellent", "external", "concentric", "fluent"], ans: 1, trans: "Bởi vì tiếng Anh trở thành ngôn ngữ toàn cầu, nhiều từ mượn nước ngoài đã được sáp nhập.", note: "Foreign = External: Nước ngoài/Bên ngoài." },
        { q: "46. CLOSEST: The grammar rules can be quite *complicated* for those who are not familiar. ", opts: ["complex", "challenging", "common", "effective"], ans: 0, trans: "Các quy tắc ngữ pháp có thể khá phức tạp với những người không quen thuộc.", note: "Complicated = Complex: Phức tạp." },
        { q: "47. CLOSEST: English as a Lingua Franca (ELF) was *established* to facilitate communication. ", opts: ["created", "borrowed", "translated", "eliminated"], ans: 0, trans: "Tiếng Anh như một ngôn ngữ chung được thiết lập để tạo thuận lợi cho việc giao tiếp.", note: "Established = Created: Được tạo ra/Thiết lập." }
    ];

    let currentIdx = 0; let score = 0; let redos = 0; let timer; let failedQs = []; let consecutiveCount = 0; let wrongCountMap = {};

    function initGame() { showQuestion(); }

    function showQuestion() {
        const feedback = document.getElementById('feedback-msg');
        let q;
        if (failedQs.length > 0 && consecutiveCount >= 5) {
            q = failedQs.shift(); feedback.innerText = "Ôn lại câu cũ nhé!"; consecutiveCount = 0;
        } else {
            q = questionsData[currentIdx]; feedback.innerText = "Chị Hải đang quan sát đó!";
        }
        document.getElementById('progress-text').innerText = `${currentIdx + 1}/${questionsData.length}`;
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options'); optionsDiv.innerHTML = '';
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, q); optionsDiv.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let timeLeft = 30; const bar = document.getElementById('timer-bar'); bar.style.width = '100%';
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--; bar.style.width = (timeLeft / 30 * 100) + '%';
            if (timeLeft <= 0) { clearInterval(timer); checkAnswer(-1, questionsData[currentIdx]); }
        }, 1000);
    }

    function checkAnswer(choiceIdx, q) {
        clearInterval(timer); const options = document.querySelectorAll('.option-btn');
        const expBox = document.getElementById('explanation'); const expContent = document.getElementById('exp-content');
        if (choiceIdx === q.ans) {
            if (consecutiveCount !== 0) score++; else redos++;
            if (choiceIdx !== -1) options[choiceIdx].classList.add('correct');
        } else {
            if (choiceIdx !== -1) options[choiceIdx].classList.add('wrong');
            options[q.ans].classList.add('correct');
            if (!failedQs.includes(q)) failedQs.push(q);
            wrongCountMap[q.q] = (wrongCountMap[q.q] || 0) + 1;
        }
        expContent.innerHTML = `<strong>Dịch:</strong> ${q.trans}<br><strong>Ghi chú:</strong> ${q.note}`;
        expBox.style.display = 'block'; document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    function nextQuestion() {
        document.getElementById('explanation').style.display = 'none';
        if (consecutiveCount !== 0) currentIdx++;
        consecutiveCount++;
        if (currentIdx < questionsData.length) showQuestion();
        else if (failedQs.length > 0) { consecutiveCount = 5; showQuestion(); }
        else showStats();
    }

    function showStats() {
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('stats').style.display = 'block';
        document.getElementById('summary-data').innerText = `Bạn hoàn thành ${score}/${questionsData.length} câu.`;
        const reviewList = document.getElementById('review-list');
        for (let qText in wrongCountMap) {
            const item = document.createElement('div'); item.className = 'review-item';
            item.innerHTML = `<strong>${qText}</strong><br>Số lần sai: <span style="color:red">${wrongCountMap[qText]}</span>`;
            reviewList.appendChild(item);
        }
    }
    initGame();
</script>
</body>
</html>
